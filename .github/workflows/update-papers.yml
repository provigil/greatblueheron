name: Update papers (bioRxiv + arXiv)

on:
  schedule:
    - cron: '10 0 1,15 * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      ENABLE_EMBEDS: ${{ secrets.ENABLE_EMBEDS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install essentials
        run: |
          python -m pip install --upgrade pip
          pip install arxiv requests PyPDF2

      - name: Conditionally install embedding deps
        if: env.ENABLE_EMBEDS == 'true'
        run: |
          pip install langchain openai

      - name: Run update script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ "${{ env.ENABLE_EMBEDS }}" = "true" ]; then
            python update_papers.py --with-embeds
          else
            python update_papers.py
          fi

      - name: Commit only changed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Add only files that exist
          for f in README.md metadata.jsonl embeds.jsonl; do
            if [ -f "$f" ]; then
              git add "$f"
            fi
          done
          # Commit only if there are staged changes
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            git commit -m "Automated: update papers (README + metadata)" || echo "commit failed or nothing to commit"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
